<!DOCTYPE HTML> 
<html> 
    <head> 
        <title>form</title> 
        <meta charset="UTF-8"> 
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="css/style.css"> 
    </head> 
<body> 
    <header> 
        Aplikasi Manajemen Pegawai 
    </header> 
    <div class="container"> 
        <aside> 
            <ul class="menu"> 
                <li><a href="dashboard.html" class="aktif">Dashboard</a></li> 
                <li><a href="tabel.html" class="aktif">Data Pegawai</a></li> 
                <li><a href="tabel.html" class="aktif">Data Jabatan</a></li> 
                <li><a href="login.html" class="aktif">Keluar</a></li> 
            </ul> 
        </aside> 

        <section class="main"> 
            <h2 class="judul">Tambah Pegawai</h2> 
            <form action="proses.php" method="post"> 
                <div class="form-group"> 
                    <label for="foto">Foto</label> 
                    <div class="input"> <input type="file" id="foto"> </div> 
                </div> 
                
                <div class="form-group"> 
                    <label for="nama">Nama</label> 
                    <div class="input"> <input type="text" id="nama"> </div> 
                </div> 
                
                <div class="form-group"> 
                    <label for="jk">Jenis Kelamin</label> 
                    <input type="radio" id="jk" name="jk" value="L"> Laki-laki 
                    <input type="radio" id="jk" name="jk" value="P"> Perempuan 
                </div>

                <div class="form-group"> 
                    <label for="tanggal">Tanggal</label> 
                    <div class="input"><input type="date" id="tanggal"></div> 
                </div>
                
                <div class="form-group"> 
                    <label for="jabatan">Jabatan</label> 
                    <div class="input"> 
                        <select id="jabatan"> 
                            <option value="direktur">Direktur</option> 
                            <option value="manajer">Manajer</option> 
                            <option value="marketing">Marketing</option> 
                            <option value="sekretaris">Sekretaris</option> 
                            <option value="Chef">Chef</option> 
                            <option value="waiter">Waiter/Waitress</option> 
                            <option value="kasir">Kasir</option> 
                        </select> 
                    </div> 
                </div>

                <div class="form-group"> 
                    <button type="submit" class="btn btn-primary">Simpan</button> 
                    <button type="reset" class="btn btn-warning">Batal</button>  
                </div> 
            </form> 
        </section>

    </div> 
    <footer> 
        Copyright &copy; 2026 
    </footer>
    <script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body> 
</html>
